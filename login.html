<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spain Travel Portal - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <main>
        <section class="login-section">
            <div class="login-container">
                <div class="login-card">
                    <div class="login-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 16V8C21 6.9 20.1 6 19 6H5C3.9 6 3 6.9 3 8V16C3 17.1 3.9 18 5 18H19C20.1 18 21 17.1 21 16Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3 10L12 15L21 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h1 class="login-title">Spain Travel Portal</h1>
                    <p class="login-subtitle">School Trip 2026 - Login to access your travel details</p>

                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="Enter your username" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="login-button">Login</button>
                    </form>

                    <p class="demo-text">Demo: Use any username and password to login</p>
                </div>
            </div>
        </section>

    
    </main>
    <script src="script.js"></script>
</body>
</html>
